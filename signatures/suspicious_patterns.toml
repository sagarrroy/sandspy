[[patterns]]
name = "AWS Access Key"
regex = 'AKIA[0-9A-Z]{16}'

[[patterns]]
name = "Generic API Key"
regex = '(?i)(api[_-]?key|apikey|token|secret)\s*[=:]\s*["'']?[a-zA-Z0-9_\-]{16,}'

[[patterns]]
name = "Private Key Header"
regex = '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'

[[patterns]]
name = "Connection String"
regex = '(?i)((postgres(ql)?|mysql|mongodb|redis|amqp|mssql)://[^\s]+|(server|host|data source)\s*=\s*[^;\n]+;\s*(user id|uid|password|pwd)\s*=\s*[^;\n]+)'

[[patterns]]
name = "GitHub Token"
regex = 'gh[ps]_[A-Za-z0-9_]{10,}'

[[patterns]]
name = "Slack Token"
regex = 'xox[bpras]-[A-Za-z0-9\-]+'

[[patterns]]
name = "JWT Token"
regex = 'eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*'

[[patterns]]
name = "Anthropic API Key"
regex = 'sk-ant-[a-zA-Z0-9_\-]{10,}'

[[patterns]]
name = "OpenAI API Key (new)"
regex = 'sk-proj-[a-zA-Z0-9_\-]{10,}'

[[patterns]]
name = "OpenAI API Key (legacy)"
regex = 'sk-[a-zA-Z0-9]{32,}'

[[patterns]]
name = "AWS Secret Key"
regex = '(?i)aws_secret_access_key\s*[=:]\s*[A-Za-z0-9/+=]{30,}'

[[patterns]]
name = "Google API Key"
regex = 'AIza[0-9A-Za-z_\-]{35}'

[[patterns]]
name = "Stripe Key"
regex = '(sk|pk)_(test|live)_[A-Za-z0-9]{20,}'

[[patterns]]
name = "Password in URL"
regex = '://[^:]+:[^@\s]+@[^\s]+'

[[patterns]]
name = "Env File Secret"
regex = '(?i)(API_KEY|SECRET_KEY|DATABASE_URL|AUTH_TOKEN|ACCESS_TOKEN|PRIVATE_KEY|PASSWORD)\s*=\s*[^\s]{8,}'
