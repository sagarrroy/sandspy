name: Sandspy CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev xclip pkg-config

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Run Format Check
      run: cargo fmt -- --check
      
    - name: Run Clippy Lints
      # We enforce strict warnings
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Run Unit & Integration Tests
      run: cargo test --verbose
